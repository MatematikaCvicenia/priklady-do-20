<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Príklady do 20 – pre 1. ročník</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 40px;
    line-height: 1.6;
    background: #f9f9f9;
  }
  h2 { color: #2c3e50; }
  .menu {
    margin-bottom: 30px;
    padding: 15px;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .priklady {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }
  .priklad {
    background: white;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    padding: 16px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
  }
  .priklad b {
    font-size: 1.4em;
    color: #34495e;
  }
  input[type="number"] {
    width: 100px;
    font-size: 24px;
    padding: 6px;
    text-align: center;
    border: 2px solid #bdc3c7;
    border-radius: 6px;
  }
  .spravne { background: #e8f5e9; border-color: #27ae60; }
  .zle     { background: #ffebee; border-color: #c0392b; }

  button {
    margin: 12px 14px 20px 0;
    padding: 12px 24px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    border: none;
    border-radius: 8px;
    color: white;
    transition: all 0.2s ease;
  }
  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 12px rgba(0,0,0,0.2);
  }

  .btn-nove     { background: #28a745; }          /* zelená – Nové príklady */
  .btn-vyhodnot { background: #e67e22; }          /* oranžová – Vyhodnotiť */
  .btn-vymaz    { background: #3498db; }          /* modrá – Vymaž tabuľku */
  .btn-vymaz:hover { background: #2980b9; }

  .menu label { margin-right: 20px; font-size: 1.05em; }
  h3#vysledok { margin-top: 24px; color: #2c3e50; font-size: 1.4em; }
  .skupina { margin: 14px 0; }
  select, input[type="radio"] { vertical-align: middle; }
  small { color: #555; }
</style>
</head>
<body>

<h2>Matematika do 20 – pre prvákov</h2>

<div class="menu">
  <div class="skupina">
    <strong>Typ úloh:</strong><br>
    <label><input type="radio" name="kategoria" value="s_x" checked onchange="generuj()"> S neznámou x</label>
    <label><input type="radio" name="kategoria" value="bez_x" onchange="generuj()"> Klasické (bez x)</label>
  </div>

  <div class="skupina">
    <hr style="margin: 16px 0 12px;">
    <label><strong>Počet čísel v príklade:</strong>
      <select id="pocet_cisel" onchange="generuj()">
        <option value="2" selected>2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
      </select>
    </label>
  </div>

  <div class="skupina">
    <strong>Operácie:</strong><br>
    <label><input type="radio" name="typ" value="plus" checked onchange="generuj()"> Len sčítanie</label>
    <label><input type="radio" name="typ" value="minus" onchange="generuj()"> Len odčítanie</label>
    <label><input type="radio" name="typ" value="mix"   onchange="generuj()"> Mix (+ a −)</label>
  </div>
</div>

<button class="btn-nove" onclick="generuj()">Nové príklady</button>
<button class="btn-vyhodnot" onclick="vyhodnot()">Vyhodnotiť</button>

<h3 id="vysledok"></h3>

<div class="priklady" id="vystup"></div>

<script>
let riesenia = [];

function getPocetCisel() {
  return parseInt(document.getElementById("pocet_cisel").value) || 2;
}

function getTyp() {
  return document.querySelector('input[name="typ"]:checked')?.value || "plus";
}

function getKategoria() {
  return document.querySelector('input[name="kategoria"]:checked')?.value || "s_x";
}

function generuj() {
  const kategoria = getKategoria();
  const vystup = document.getElementById("vystup");
  vystup.innerHTML = "";
  riesenia = [];

  if (kategoria === "s_x") {
    generujSX();
  } else {
    generujBezX();
  }

  document.getElementById("vysledok").innerText = "";
}

function generujSX() {
  const pocetCiselOkremX = getPocetCisel();
  const pocetOperacii = (pocetCiselOkremX === 2) ? 1 : pocetCiselOkremX - 1;
  const typ = getTyp();

  for (let i = 0; i < 12; i++) {
    let cisla = [];
    let znaky = [];

    for (let j = 0; j < pocetOperacii; j++) {
      cisla.push(Math.floor(Math.random() * 9) + 1);
      let z = (typ === "plus") ? "+" :
              (typ === "minus") ? "-" :
              (Math.random() < 0.5 ? "+" : "-");
      znaky.push(z);
    }

    let priklad = "";
    let vysledok = 0;
    let spravneX = 0;

    if (pocetOperacii === 1) {
      const xVlavom = Math.random() < 0.6;
      const cislo = cisla[0];
      const operacia = znaky[0];

      spravneX = Math.floor(Math.random() * 11) + 3; // 3–13

      if (xVlavom) {
        priklad = `x ${operacia} ${cislo} = `;
        vysledok = spravneX + (operacia === "+" ? cislo : -cislo);
      } else {
        priklad = `${cislo} ${operacia} x = `;
        if (operacia === "+") {
          vysledok = cislo + spravneX;
        } else {
          vysledok = cislo - spravneX;
          // ak by výsledok bol <1, prehodíme na plus (aby bolo pozitívnejšie)
          if (vysledok < 1) {
            vysledok = cislo + spravneX;
            priklad = `${cislo} + x = `;
          }
        }
      }
    } else {
      spravneX = Math.floor(Math.random() * 11) + 3;
      priklad = "x";
      for (let j = 0; j < cisla.length; j++) {
        priklad += ` ${znaky[j]} ${cisla[j]}`;
      }
      priklad += " = ";
      vysledok = spravneX;
      znaky.forEach((z, idx) => {
        vysledok += (z === "+") ? cisla[idx] : -cisla[idx];
      });
      priklad += vysledok;
    }

    if (vysledok < 1 || vysledok > 20 || spravneX < 1 || spravneX > 20) {
      i--;
      continue;
    }

    riesenia.push(spravneX);
    vytvorPriklad(priklad);
  }
}

function generujBezX() {
  const pocet = getPocetCisel();
  const typ = getTyp();

  for (let i = 0; i < 12; i++) {
    let priklad = "";
    let vysledok = 0;

    for (let j = 0; j < pocet; j++) {
      let cislo = Math.floor(Math.random() * 9) + 1;

      if (j === 0) {
        priklad += cislo;
        vysledok = cislo;
        continue;
      }

      let znak;
      if (typ === "plus") znak = "+";
      else if (typ === "minus") znak = "-";
      else                    znak = Math.random() < 0.55 ? "+" : "-";

      priklad += ` ${znak} ${cislo}`;
      vysledok += (znak === "+") ? cislo : -cislo;
    }

    if (vysledok < 1 || vysledok > 20) {
      i--;
      continue;
    }

    priklad += " = ";
    riesenia.push(vysledok);
    vytvorPriklad(priklad);
  }
}

function vytvorPriklad(text) {
  const div = document.createElement("div");
  div.className = "priklad";
  div.innerHTML = `
    <b>${text}</b><br><br>
    <input type="number" min="0" max="40" placeholder="?"><br><br>
    <small>pomocná tabuľka / kreslenie (stlač a ťahaj myšou):</small><br>
    <canvas width="280" height="200"></canvas><br>
    <button class="btn-vymaz" onclick="vymaz(this)">Vymaž tabuľku</button>
  `;
  document.getElementById("vystup").appendChild(div);

  const canvas = div.querySelector("canvas");
  const ctx = canvas.getContext("2d");
  let kresli = false;

  ctx.lineWidth = 10;
  ctx.lineCap = "round";
  ctx.strokeStyle = "#0a3d62";

  function nakresli(e) {
    if (!kresli) return;
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    ctx.lineTo(x, y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x, y);
  }

  canvas.addEventListener("mousedown", (e) => {
    kresli = true;
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    ctx.beginPath();
    ctx.moveTo(x, y);
    nakresli(e);
  });

  canvas.addEventListener("mousemove", nakresli);

  canvas.addEventListener("mouseup", () => { kresli = false; ctx.beginPath(); });
  canvas.addEventListener("mouseleave", () => { kresli = false; ctx.beginPath(); });
}

function vymaz(btn) {
  const canvas = btn.parentElement.querySelector("canvas");
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function vyhodnot() {
  const priklady = document.querySelectorAll(".priklad");
  let ok = 0;
  priklady.forEach((p, i) => {
    const val = p.querySelector("input").value.trim();
    p.classList.remove("spravne", "zle");
    if (val !== "" && Number(val) === riesenia[i]) {
      p.classList.add("spravne");
      ok++;
    } else {
      p.classList.add("zle");
    }
  });
  document.getElementById("vysledok").innerText = `Správne: ${ok} / ${riesenia.length}`;
}

// spustenie pri načítaní
generuj();
</script>
</body>
</html>
